apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "project-argus-monitor.fullname" . }}
labels:
  {{- include "project-argus-monitor.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            # 1. Ensure the sidecar is injected
            sidecar.istio.io/inject: "true"
            # 2. Prevent the app from starting until the proxy is ready
            # and allow the proxy to shut down when the app finishes.
            proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
        spec:
          containers:
          - name: monitor
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            command: ["python"]
            args: ["monitor.py"]
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            env:
            - name: URLS_TO_MONITOR
              value: {{ .Values.urls | quote }}
            - name: AWS_REGION
              value: "us-east-1"
            envFrom:
            - secretRef:
                name: aws-creds
          restartPolicy: OnFailure