apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "project-argus-monitor.fullname" . | quote }}
  labels:
    {{- include "project-argus-monitor.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            # 1. Ensure the Istio sidecar is injected
            sidecar.istio.io/inject: "true"
            # 2. Block the app until the proxy is ready (prevents network errors at startup)
            proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
        spec:
          # 3. Use the ECR secret we created in Phase 10
          imagePullSecrets:
            - name: regcred
          containers:
          - name: monitor
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            # 4. Use a shell wrapper to manually kill the Istio sidecar upon completion
            command: ["/bin/sh", "-c"]
            args: 
            # Add a 5 second sleep BEFORE the quitquitquit to allow OTel to flush
              - |
                python monitor.py;
                EXIT_CODE=$?;
                echo "Pings finished. Waiting for OTel trace flush...";
                sleep 5; 
                curl -sf -X POST http://localhost:15020/quitquitquit;
                exit $EXIT_CODE;
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            env:
            - name: URLS_TO_MONITOR
              value: {{ .Values.urls | quote }}
            - name: AWS_REGION
              value: "us-east-1"
            envFrom:
            - secretRef:
                name: aws-creds
          restartPolicy: OnFailure