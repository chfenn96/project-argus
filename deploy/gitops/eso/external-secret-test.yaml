apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argus-test-sync
  namespace: default
spec:
  refreshInterval: 1m         # How often to check AWS for updates
  secretStoreRef:
    name: aws-secretsmanager  # Must match the name in the SecretStore
    kind: SecretStore
  target:
    name: k8s-api-test        # The name of the NEW secret ESO will create in K8s
    creationPolicy: Owner
  data:
  - secretKey: api-key        # The key inside the K8s secret
    remoteRef:
      key: argus/api-test     # The name of the secret in AWS Secrets Manager
      property: api-key       # The key inside the AWS JSON